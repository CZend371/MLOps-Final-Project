apiVersion: apps/v1
kind: Deployment
metadata:
  name: sqs-consumer
  labels:
    app: sqs-consumer
spec:
  # Start with 1 replica; scale with:
  #   kubectl scale deployment sqs-consumer --replicas=3
  replicas: 1
  selector:
    matchLabels:
      app: sqs-consumer
  template:
    metadata:
      labels:
        app: sqs-consumer
    spec:
      containers:
        - name: consumer
          image: ${ECR_IMAGE_URI}
          imagePullPolicy: Always
          env:
            - name: S3_BUCKET_NAME
              value: "${S3_BUCKET_NAME}"
            - name: SQS_QUEUE_URL
              value: "${SQS_QUEUE_URL}"
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
            - name: S3_MODEL_KEY
              value: "model.pkl"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
